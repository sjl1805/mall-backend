server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/mall?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-test-query: SELECT 1
      auto-commit: true
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 1800000
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 5000
  redis:
    host: 127.0.0.1  # Redis服务器地址
    port: 6379       # Redis服务器端口
    password:        # 密码（没有密码留空）
    database: 0      # 数据库索引（0-15）
    timeout: 3000ms  # 连接超时时间
    lettuce:
      pool:
        max-active: 20    # 连接池最大连接数（使用负值表示没有限制）
        max-wait: -1ms    # 连接池最大阻塞等待时间（使用负值表示没有限制）
        max-idle: 10      # 连接池中的最大空闲连接
        min-idle: 5       # 连接池中的最小空闲连接
      shutdown-timeout: 100ms  # 关闭超时时间

jwt:
  token-expire-hour: 24  # token有效期(小时)
  secret-key: "your-secret-key-here-please-change-it-to-a-secure-random-string" # 建议使用Base64编码的256位随机字符串

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  info:
    title: Mall Backend API
    description: 电商平台后端接口文档
    version: 1.0.0
    contact:
      name: Developer
      email: dev@example.com 
  default-produces-media-type: application/json

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.model.entity 

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  type-enums-package: com.example.model.enums # 枚举包路径
  global-config:
    db-config:
      id-type: auto

      logic-delete-field: deleted  # 逻辑删除字段
      logic-delete-value: 1
      logic-not-delete-value: 0 

# 可选缓存配置
cache:
  type: redis
  redis:
    time-to-live: 3600000  # 缓存过期时间（毫秒），1小时
    key-prefix: CACHE_     # 缓存key前缀
    cache-null-values: true # 是否缓存空值 