server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/mall?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-test-query: SELECT 1
      auto-commit: true
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 1800000
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 5000

jwt:
  token-expire-hour: 24  # token有效期(小时)
  secret-key: "your-secret-key-here-please-change-it-to-a-secure-random-string" # 建议使用Base64编码的256位随机字符串

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  info:
    title: Mall Backend API
    description: 电商平台后端接口文档
    version: 1.0.0
    contact:
      name: Developer
      email: dev@example.com 
  default-produces-media-type: application/json

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.model.entity 

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  type-enums-package: com.example.model.enums # 枚举包路径
  global-config:
    db-config:
      id-type: auto

      logic-delete-field: deleted  # 逻辑删除字段
      logic-delete-value: 1
      logic-not-delete-value: 0 